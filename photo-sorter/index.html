<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Sorter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <div id="header-row">
        <h1>Photo Sorter</h1>
        <div id="upload-area">
          <input type="file" id="file-input" multiple accept="image/*" />
          <label for="file-input" id="upload-label">
            <span class="icon" aria-hidden="true">+</span>
            <span>Add Photos</span>
          </label>
          <input type="file" id="folder-input" webkitdirectory multiple accept="image/*" />
          <label for="folder-input" id="folder-label">
            <span class="icon" aria-hidden="true">[]</span>
            <span>Add Folder</span>
          </label>
        </div>
        <div id="stats" class="hidden"></div>
      </div>

      <!-- Filter bar, hidden until photos are loaded. -->
      <div id="filter-bar" class="hidden">
        <select id="filter-year"><option value="">All years</option></select>
        <select id="filter-month"><option value="">All months</option></select>
        <button id="filter-clear">Clear</button>
      </div>
    </header>

    <main id="gallery"></main>

    <div id="lightbox" class="hidden" role="dialog" aria-modal="true">
      <button id="lb-close" aria-label="Close">&times;</button>
      <button id="lb-prev" aria-label="Previous photo">&lsaquo;</button>
      <button id="lb-next" aria-label="Next photo">&rsaquo;</button>
      <div id="lb-content">
        <img id="lb-img" src="" alt="" />
        <div id="lb-info">
          <h2 id="lb-name"></h2>
          <div id="lb-meta"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/exif-js@2.3.0/exif.js"></script>
  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
